<!DOCTYPE html>
<html>
<head>
  <title>Sahil Travels</title>

  <meta name="description" content="Sahil Travels - Car Booking Service">
  
  <style>
    body {
      font-family: Arial;
      margin: 0;
      text-align: center;
      background: #eef2f3;
    }

    .logo {
      font-size: 30px;
      font-weight: bold;
      color: #007bff;
      padding: 15px;
      animation: fadeIn 2s;
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }

    .car {
      display: inline-block;
      width: 270px;
      margin: 15px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .car:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px 10px 0 0;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      color: white;
      background: green;
      cursor: pointer;
    }

    .call-btn { background: blue; }

    input, select {
      padding: 8px;
      width: 220px;
      margin: 5px;
    }

    .gallery img {
      width: 150px;
      margin: 5px;
      border-radius: 8px;
    }

    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      border-radius: 50%;
      padding: 15px;
      font-size: 20px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="logo">🚗 SAHIL TRAVELS</div>
<p>Driver Included | Safe & Trusted</p>

<!-- Call -->
<a href="tel:9369543580">
  <button class="call-btn">📞 Call Now</button>
</a>

<!-- Cars -->
<div class="car">
  <img src="bolero.jpg">
  <h3>Bolero SUV</h3>
  <p>Long Tour | Village Trip</p>
</div>

<div class="car">
  <img src="ertiga.jpg">
  <h3>Ertiga</h3>
  <p>Family | Wedding</p>
</div>

<!-- Booking -->
<h2>📋 Book Now</h2>

<form onsubmit="submitForm(event)">
  <input type="text" id="name" placeholder="Name" required><br>
  <input type="tel" id="phone" placeholder="Phone" required><br>
  <input type="text" id="pickup" placeholder="Pickup" required><br>
  <input type="text" id="drop" placeholder="Drop" required><br>

  <select id="car">
    <option>Bolero SUV</option>
    <option>Ertiga</option>
  </select><br>

  <input type="date" id="date"><br><br>

  <button type="submit">🚀 Book on WhatsApp</button>
</form>

<!-- UPI -->
<h3>💰 Pay Advance</h3>
<a href="upi://pay?pa=9369543580@kotak811&pn=SahilTravels&cu=INR">
  <button>Pay via UPI</button>
</a>

<!-- Gallery -->
<h2>📸 Our Vehicles</h2>
<div class="gallery">
  <img src="bolero.jpg">
  <img src="ertiga.jpg">
</div>

<!-- Map -->
<h2>📍 Location</h2>
<iframe src="https://maps.google.com/maps?q=india&output=embed" width="90%" height="200"></iframe>

<!-- WhatsApp -->
<a class="whatsapp-float" href="https://wa.me/919369543580">💬</a>

<script>
function submitForm(e) {
  e.preventDefault();

  let msg = "Booking Request\n"
    + "Name: " + name.value + "\n"
    + "Phone: " + phone.value + "\n"
    + "Pickup: " + pickup.value + "\n"
    + "Drop: " + drop.value + "\n"
    + "Car: " + car.value + "\n"
    + "Date: " + date.value;

  window.open("https://wa.me/919369543580?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
